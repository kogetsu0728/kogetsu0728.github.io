<!doctype html>
<html lang="{{ site.lang | default: 'ja' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <style>
      :root {
        --page-padding-y: 24px;
        --page-padding-x: 16px;
        --content-max-width: 760px;
        --marquee-duration: 6.4s;
        --rainbow-duration: 1.2s;
        --color-bg: #050805;
        --color-text: #e3f7df;
        --color-heading: #9df7a5;
        --color-link: #7dff91;
        --color-link-hover: #c8ffd0;
        --color-rule: #1f3b24;
      }

      body {
        margin: 0;
        padding: var(--page-padding-y) var(--page-padding-x);
        background-color: var(--color-bg);
        color: var(--color-text);
      }

      main {
        max-width: var(--content-max-width);
        margin: 0 auto;
        overflow-x: hidden;
      }

      a {
        color: var(--color-link);
      }

      a:hover,
      a:focus {
        color: var(--color-link-hover);
      }

      h2 {
        color: var(--color-heading);
      }

      hr {
        border: 0;
        border-top: 1px solid var(--color-rule);
      }

      h1 {
        display: inline-block;
        width: max-content;
        margin: 0;
        white-space: nowrap;
        background-image: linear-gradient(
          90deg,
          #ff003c,
          #ff8a00,
          #ffe600,
          #00d084,
          #00a6ff,
          #7a00ff,
          #ff00b8,
          #ff003c
        );
        background-size: 300% 100%;
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
        will-change: transform;
        animation:
          h1-marquee var(--marquee-duration) linear infinite,
          h1-rainbow var(--rainbow-duration) linear infinite;
      }

      @keyframes h1-marquee {
        from {
          transform: translateX(min(var(--content-max-width), calc(100vw - (var(--page-padding-x) * 2))));
        }

        to {
          transform: translateX(-100%);
        }
      }

      @keyframes h1-rainbow {
        from {
          background-position: 0% 50%;
        }

        to {
          background-position: 100% 50%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      {{ content }}
    </main>
  </body>
</html>
