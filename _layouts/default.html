<!doctype html>
<html lang="{{ site.lang | default: 'ja' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <style>
      :root {
        --page-padding-y: 24px;
        --page-padding-x: 16px;
        --content-max-width: 760px;
        --marquee-duration: 6.4s;
        --rainbow-duration: 1.2s;
      }

      body {
        margin: 0;
        padding: var(--page-padding-y) var(--page-padding-x);
        background-color: #f3ffe6;
      }

      main {
        max-width: var(--content-max-width);
        margin: 0 auto;
        overflow-x: hidden;
      }

      h1 {
        display: inline-block;
        width: max-content;
        margin: 0;
        white-space: nowrap;
        background-image: linear-gradient(
          90deg,
          #ff003c,
          #ff8a00,
          #ffe600,
          #00d084,
          #00a6ff,
          #7a00ff,
          #ff00b8,
          #ff003c
        );
        background-size: 300% 100%;
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
        will-change: transform;
        animation:
          h1-marquee var(--marquee-duration) linear infinite,
          h1-rainbow var(--rainbow-duration) linear infinite;
      }

      .visitor-counter {
        width: fit-content;
        max-width: 100%;
        margin: 18px 0 0;
        padding: 6px 8px 7px;
        border: 1px solid #2f422f;
        background: #020402;
        color: #8dea94;
        font-size: 12px;
        line-height: 1.35;
      }

      .visitor-counter p {
        margin: 0;
      }

      .visitor-counter strong {
        font-size: 16px;
        line-height: 1;
        font-weight: 700;
        font-family: "Courier New", Courier, monospace;
        letter-spacing: 1px;
        color: #b8ffbd;
      }

      @keyframes h1-marquee {
        from {
          transform: translateX(min(var(--content-max-width), calc(100vw - (var(--page-padding-x) * 2))));
        }

        to {
          transform: translateX(-100%);
        }
      }

      @keyframes h1-rainbow {
        from {
          background-position: 0% 50%;
        }

        to {
          background-position: 100% 50%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      {{ content }}
    </main>
  </body>
</html>
